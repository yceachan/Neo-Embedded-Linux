[core]
shell=kiosk-shell.so
require-input=false
require-outputs=none
idle-time=0

[shell]
locking=false
startup-animation=none

[output]
name=DSI-1
app-ids=com.tspi.greet

# 完全替换 SHM 版 (tspi-greet / tspi-greet-rs) 的 autolaunch
# —— 板上把 ini 软链到 /etc/xdg/weston/weston.ini.d/ 之后,
#    weston 启动自动拉起 EGL 版客户端
[autolaunch]
path=/usr/bin/tspi-greet-egl
