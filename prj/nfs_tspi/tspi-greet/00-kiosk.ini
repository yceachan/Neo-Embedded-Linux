[core]
shell=kiosk-shell.so
require-input=false
require-outputs=none
idle-time=0

[shell]
locking=false
startup-animation=none

[output]
name=DSI-1
app-ids=com.tspi.greet

[autolaunch]
path=/usr/bin/tspi-greet
# watch=true 在 weston 14 的语义是"子进程死则 weston 也死"，非自动重拉，
# init.d 链路下没有恢复效果 — 故不写（默认 false）。

